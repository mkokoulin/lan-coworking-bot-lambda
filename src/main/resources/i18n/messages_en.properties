# --- kotolog flow ---
kotolog_intro=<b>KOTOLOG \uD83D\uDC31</b>\nCats looking for a loving home.\nOur initiatives: book swap, talks, bookshelf and suspended drinks \u2014 all for cats.\nPick a section below:
kotolog_btn_view=\uD83D\uDC3E View cats
kotolog_btn_help=\uD83D\uDE4C How to help cats
kotolog_btn_back=\u2B05\uFE0F Back
kotolog_help_text=<b>How to Help the Kitties \uD83D\uDC3E\uD83D\uDE3A</b>\n\n1) \uD83D\uDE3A\uD83D\uDCDA <b>Book Shelf</b> \u2014 take a book in exchange for a donation of any amount. All proceeds go toward food and medical care. \uD83D\uDC08 \uD83D\uDC08 \uD83D\uDC08\n2) \uD83D\uDE3D\uD83D\uDCD5 <b>Book Swap</b> \u2014 bring books you no longer need for free and help keep the circle of kindness going. \uD83D\uDC08\u200D\u2B1B\n3) \uD83D\uDE3B\uD83C\uDF8F <b>Food</b> \u2014 bring any cat food or treats your cats won\u2019t eat. Ours will happily finish everything! \uD83D\uDC1F\n4) \uD83D\uDE38\uD83C\uDFA4 <b>Merch</b> \u2014 buy stickers, postcards, and cookies featuring our cats. Each one is one of a kind! \uD83D\uDC06\n5) \uD83D\uDE3C\uD83D\uDCB0 <b>Donation</b> \u2014 simple and clear. Leave any amount in cash or by card to support the one who curls up on your lap in our caf\u00E9. Maybe it\u2019s love! \uD83D\uDC3E\n\nMore about our projects \u2014 @lan_yerevan. We\u2019ll be happy to chat! \uD83D\uDE3A
kotolog_donate_note=\uD83D\uDCAC <b>Contact us</b>\nWrite to @lan_yerevan \u2014 we\u2019ll tell you how you can help \uD83D\uDC3E