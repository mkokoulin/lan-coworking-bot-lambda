# --- coworking flow ---
coworking_intro=\uD83D\uDCBC Letters & Numbers \u2014 coworking, bar and events in the heart of Yerevan.\nWant to try? Start with /booking \u2014 first visit comes with a nice bonus \uD83D\uDE09
coworking_prices=\uD83D\uDCB3 Coworking prices:\n\u2022 1 hour \u2014 1,300\u058F\n\u2022 4 hours \u2014 3,000\u058F\n\u2022 1 day \u2014 5,000\u058F\n\u2022 7 days \u2014 25,000\u058F (20,000\u058F renewal)\n\u2022 30 days \u2014 75,000\u058F (60,000\u058F renewal)\n\u2022 LAN+ (60 days) \u2014 120,000\u058F (96,000\u058F renewal)
coworking_meeting=\uD83E\uDDD1\u200D\uD83D\uDCBC Meeting room (up to 6 people), price per hour:\n\u2022 \u201C1+1\u201D \u2014 3,500\u058F\n\u2022 \u201Cup to 6 people\u201D \u2014 5,000\u058F\n\u2022 Residents (additional hours) \u2014 2,000\u058F\n<i>Discount for bookings of 5 hours or more. Booking in 30-minute increments.</i>
