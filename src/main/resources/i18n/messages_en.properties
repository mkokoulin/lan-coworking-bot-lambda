# --- about flow ---
about_text=We are aligning the venue map to help you navigate. Letters & Numbers hosts: a coworking space, a coffee shop and an event area. Locations and rules are marked here.\n\n\uD83D\uDC08 Address: Yerevan<a href='https://yandex.ru/maps/-/CDecr088'>, 35 Tumanyan St.</a>\n\n\u2014 To use the coworking and premises you need to choose and pay the appropriate plan. See plans on <a href='https://lettersandnumbers.am/'>the website</a>.\n\n\u2014 Caf\u00E9 guests can use the caf\u00E9 hall and the outdoor area.\n\n\uD83D\uDCBB Coworking has quiet and non-quiet zones.\n\nThe main hall and part of the window-side terrace are a quiet zone 10:00\u201319:00: please avoid conversations and use headphones for video. Contact the admin if someone breaks silence. After 19:00 calls and talks are ok while keeping the working vibe. Drinks and cookies are welcome.\n\nThe caf\u00E9 hall and the yard are non-quiet zones (except window tables on terrace #1): meetings, calls and meals are fine. You can bring food (store via barista), order delivery, or buy in our caf\u00E9.\n\n\uD83D\uDD1C Coworking hours: weekdays 10\u201322, weekends 10\u201316. The venue is open daily 10\u201322.

