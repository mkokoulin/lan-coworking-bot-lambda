# --- about flow ---
about_text=\uD83D\uDDFA\uFE0F \u0421\u0445\u0435\u043C\u0430 \u043F\u043B\u043E\u0449\u0430\u0434\u043A\u0438, \u0447\u0442\u043E\u0431\u044B \u043B\u0435\u0433\u0447\u0435 \u043E\u0440\u0438\u0435\u043D\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C\u0441\u044F. \u0412 L&N \u0435\u0441\u0442\u044C \u043A\u043E\u0432\u043E\u0440\u043A\u0438\u043D\u0433, \u043A\u043E\u0444\u0435\u0439\u043D\u044F \u0438 \u043F\u043B\u043E\u0449\u0430\u0434\u043A\u0430 \u0434\u043B\u044F \u043C\u0435\u0440\u043E\u043F\u0440\u0438\u044F\u0442\u0438\u0439. \u0417\u0434\u0435\u0441\u044C \u043E\u0442\u043C\u0435\u0447\u0435\u043D\u044B \u043B\u043E\u043A\u0430\u0446\u0438\u0438 \u0438 \u043F\u0440\u0430\u0432\u0438\u043B\u0430 \u043F\u043E\u0432\u0435\u0434\u0435\u043D\u0438\u044F.\n\n\uD83D\uDC08 \u0410\u0434\u0440\u0435\u0441: \u0433. \u0415\u0440\u0435\u0432\u0430\u043D<a href='https://yandex.ru/maps/-/CDecr088'>, \u0443\u043B. \u0422\u0443\u043C\u0430\u043D\u044F\u043D\u0430 35\u0413.</a>\n\n\u2014 \u0427\u0442\u043E\u0431\u044B \u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u044C\u0441\u044F \u043F\u043E\u043C\u0435\u0449\u0435\u043D\u0438\u044F\u043C\u0438 \u0438 \u0443\u0441\u043B\u0443\u0433\u0430\u043C\u0438 \u043A\u043E\u0432\u043E\u0440\u043A\u0438\u043D\u0433\u0430, \u0432\u044B\u0431\u0435\u0440\u0438\u0442\u0435 \u0438 \u043E\u043F\u043B\u0430\u0442\u0438\u0442\u0435 \u0441\u043E\u043E\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0443\u044E\u0449\u0438\u0439 \u0442\u0430\u0440\u0438\u0444 \u2014 \u0441\u043C. <a href='https://lettersandnumbers.am/'>\u0441\u0430\u0439\u0442</a>.\n\n\u2014 \u041F\u043E\u0441\u0435\u0442\u0438\u0442\u0435\u043B\u044F\u043C \u043A\u043E\u0444\u0435\u0439\u043D\u0438 \u0434\u043E\u0441\u0442\u0443\u043F\u043D\u044B \u0437\u0430\u043B \u043A\u043E\u0444\u0435\u0439\u043D\u0438 \u0438 \u0443\u043B\u0438\u0447\u043D\u0430\u044F \u0447\u0430\u0441\u0442\u044C \u043F\u043B\u043E\u0449\u0430\u0434\u043A\u0438.\n\n\uD83D\uDCBB \u0412 \u043A\u043E\u0432\u043E\u0440\u043A\u0438\u043D\u0433\u0435 \u0435\u0441\u0442\u044C \u0442\u0438\u0445\u0430\u044F \u0438 \u0448\u0443\u043C\u043D\u0430\u044F \u0437\u043E\u043D\u044B.\n\n\uD83E\uDD2B \u041E\u0441\u043D\u043E\u0432\u043D\u043E\u0439 \u0437\u0430\u043B \u0438 \u0447\u0430\u0441\u0442\u044C \u0442\u0435\u0440\u0440\u0430\u0441\u044B \u0443 \u043E\u043A\u043D\u0430 \u2014 \u0442\u0438\u0445\u0430\u044F \u0437\u043E\u043D\u0430 10:00\u201319:00: \u0440\u0430\u0437\u0433\u043E\u0432\u043E\u0440\u044B \u043D\u0435\u0443\u043C\u0435\u0441\u0442\u043D\u044B, \u0432\u0438\u0434\u0435\u043E \u0442\u043E\u043B\u044C\u043A\u043E \u0432 \u043D\u0430\u0443\u0448\u043D\u0438\u043A\u0430\u0445. \u0415\u0441\u043B\u0438 \u043D\u0430\u0440\u0443\u0448\u0430\u044E\u0442 \u0442\u0438\u0448\u0438\u043D\u0443 \u2014 \u043E\u0431\u0440\u0430\u0442\u0438\u0442\u0435\u0441\u044C \u043A \u0430\u0434\u043C\u0438\u043D\u0438\u0441\u0442\u0440\u0430\u0442\u043E\u0440\u0443. \u041F\u043E\u0441\u043B\u0435 19:00 \u043C\u043E\u0436\u043D\u043E \u0441\u043E\u0437\u0432\u0430\u043D\u0438\u0432\u0430\u0442\u044C\u0441\u044F, \u0441\u043E\u0445\u0440\u0430\u043D\u044F\u044F \u0440\u0430\u0431\u043E\u0447\u0443\u044E \u0430\u0442\u043C\u043E\u0441\u0444\u0435\u0440\u0443. \u041A\u043E\u0444\u0435/\u0447\u0430\u0439/\u043F\u0435\u0447\u0435\u043D\u044C\u0435 \u043C\u043E\u0436\u043D\u043E \u0431\u0440\u0430\u0442\u044C \u0432 \u0437\u0430\u043B.\n\n\u2615 \u0417\u0430\u043B \u043A\u043E\u0444\u0435\u0439\u043D\u0438 \u0438 \u0434\u0432\u043E\u0440 \u2014 \u0448\u0443\u043C\u043D\u044B\u0435 \u0437\u043E\u043D\u044B (\u043A\u0440\u043E\u043C\u0435 \u0441\u0442\u043E\u043B\u0438\u043A\u043E\u0432 \u0443 \u043E\u043A\u043D\u0430 \u043D\u0430 \u0442\u0435\u0440\u0440\u0430\u0441\u0435 \u21161): \u0432\u0441\u0442\u0440\u0435\u0447\u0438, \u0437\u0432\u043E\u043D\u043A\u0438, \u043F\u0440\u0438\u0451\u043C \u043F\u0438\u0449\u0438 \u0440\u0430\u0437\u0440\u0435\u0448\u0435\u043D\u044B. \u0415\u0434\u0443 \u043C\u043E\u0436\u043D\u043E \u043F\u0440\u0438\u043D\u0435\u0441\u0442\u0438 (\u0445\u0440\u0430\u043D\u0435\u043D\u0438\u0435 \u0447\u0435\u0440\u0435\u0437 \u0431\u0430\u0440\u0438\u0441\u0442\u0430), \u0437\u0430\u043A\u0430\u0437\u0430\u0442\u044C \u0434\u043E\u0441\u0442\u0430\u0432\u043A\u0443 \u0438\u043B\u0438 \u043A\u0443\u043F\u0438\u0442\u044C \u0443 \u043D\u0430\u0441.\n\n\uD83D\uDD1C \u041A\u043E\u0432\u043E\u0440\u043A\u0438\u043D\u0433: \u0431\u0443\u0434\u043D\u0438 10\u201322, \u0432\u044B\u0445\u043E\u0434\u043D\u044B\u0435 10\u201316. \u041F\u043B\u043E\u0449\u0430\u0434\u043A\u0430 \u0435\u0436\u0435\u0434\u043D\u0435\u0432\u043D\u043E 10\u201322.
 
