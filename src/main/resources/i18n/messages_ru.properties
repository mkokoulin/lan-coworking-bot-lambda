kotolog_intro=<b>\u041A\u041E\u0422\u041E\u041B\u041E\u0413 \uD83D\uDC31</b>\n\u0417\u0434\u0435\u0441\u044C \u0436\u0438\u0432\u0443\u0442 \u043A\u043E\u0442\u0438\u043A\u0438, \u043A\u043E\u0442\u043E\u0440\u044B\u043C \u043D\u0443\u0436\u0435\u043D \u0434\u043E\u043C.\n\u041D\u0430\u0448\u0438 \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u044B: \u043A\u043D\u0438\u0436\u043D\u044B\u0439 \u0441\u0432\u043E\u043F, \u043B\u0435\u043A\u0446\u0438\u0438, \u043F\u043E\u043B\u043A\u0430 \u0438 \u043E\u0442\u043B\u043E\u0436\u0435\u043D\u043D\u044B\u0435 \u043D\u0430\u043F\u0438\u0442\u043A\u0438 \u2014 \u0432\u0441\u0451 \u0432 \u043F\u043E\u043B\u044C\u0437\u0443 \u043A\u043E\u0442\u0438\u043A\u043E\u0432.\n\u0412\u044B\u0431\u0435\u0440\u0438\u0442\u0435 \u0440\u0430\u0437\u0434\u0435\u043B \u043D\u0438\u0436\u0435:
